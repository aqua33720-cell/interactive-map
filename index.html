<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interactive Map</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      position: relative;
      cursor: grab;
    }

    img {
      width: 100%;
      transform-origin: 0 0;
      user-select: none;
      pointer-events: none;
    }

    /* Zoom buttons */
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }

    button {
      display: block;
      margin: 5px;
      padding: 10px;
      font-size: 18px;
      border: none;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="container">
  <img id="map" src="Drusilla's_Map.png">

  <!-- Zoom Controls -->
  <div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
  </div>
</div>

<script>
let scale = 1;
let x = 0;
let y = 0;
let startX, startY;
let dragging = false;

const map = document.getElementById("map");
const container = document.getElementById("container");

// 🔍 ZOOM BUTTONS
function zoomIn() {
  scale += 0.2;
  scale = Math.min(scale, 4);
  update();
}

function zoomOut() {
  scale -= 0.2;
  scale = Math.max(scale, 1);
  update();
}

// 🖱️ DRAG TO PAN
container.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.clientX - x;
  startY = e.clientY - y;
});

container.addEventListener("mouseup", () => dragging = false);
container.addEventListener("mouseleave", () => dragging = false);

container.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  x = e.clientX - startX;
  y = e.clientY - startY;
  update();
});

// 📱 TOUCH PAN
container.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX - x;
  startY = e.touches[0].clientY - y;
});

container.addEventListener("touchmove", (e) => {
  x = e.touches[0].clientX - startX;
  y = e.touches[0].clientY - startY;
  update();
});

// 🔄 APPLY TRANSFORM
function update() {
  map.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}
</script>

</body>
</html>
