<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interactive Map</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      touch-action: none;
      cursor: grab;
    }

    img {
      width: 100%;
      transform-origin: 0 0;
      user-select: none;
      pointer-events: none;
    }

    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }

    button {
      display: block;
      margin: 5px;
      padding: 10px;
      font-size: 18px;
      border: none;
      background: white;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div id="container">
  <img id="map" src="your-map.png">

  <div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
  </div>
</div>

<script>
let scale = 1;
let x = 0;
let y = 0;
let startX, startY;
let dragging = false;

const map = document.getElementById("map");
const container = document.getElementById("container");

// 🔍 ZOOM
function zoomIn() {
  scale = Math.min(scale + 0.2, 4);
  applyBounds();
}

function zoomOut() {
  scale = Math.max(scale - 0.2, 1);
  applyBounds();
}

// 🖱️ DRAG
container.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.clientX - x;
  startY = e.clientY - y;
});

container.addEventListener("mouseup", () => dragging = false);
container.addEventListener("mouseleave", () => dragging = false);

container.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  x = e.clientX - startX;
  y = e.clientY - startY;
  applyBounds();
});

// 📱 TOUCH
container.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX - x;
  startY = e.touches[0].clientY - y;
});

container.addEventListener("touchmove", (e) => {
  x = e.touches[0].clientX - startX;
  y = e.touches[0].clientY - startY;
  applyBounds();
});

// 🚧 BOUNDARY LOGIC
function applyBounds() {
  const containerWidth = container.clientWidth;
  const containerHeight = container.clientHeight;

  const mapWidth = map.clientWidth * scale;
  const mapHeight = map.clientHeight * scale;

  // Limit X
  if (mapWidth > containerWidth) {
    x = Math.min(0, Math.max(x, containerWidth - mapWidth));
  } else {
    x = (containerWidth - mapWidth) / 2;
  }

  // Limit Y
  if (mapHeight > containerHeight) {
    y = Math.min(0, Math.max(y, containerHeight - mapHeight));
  } else {
    y = (containerHeight - mapHeight) / 2;
  }

  update();
}

// 🔄 APPLY TRANSFORM
function update() {
  map.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

// Run once on load
window.onload = applyBounds;
</script>

</body>
</html>
