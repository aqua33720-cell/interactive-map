
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Map</title>
  <style>
    body {
      margin: 0;
    }

    .map {
      width: 100%;
      height: 100vh;
      overflow: auto; /* enables scrolling (pan) */
    }

    img {
      width: 1500px; /* make bigger than screen so you can scroll */
      display: block;
    }
  </style>
</head>

<body>

<div class="map">
  
  <img src="Drusilla's_Map.png">
</div>

</body>
</html>
