
<head>
  <meta charset="UTF-8">
  <title>Interactive Map</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      position: relative;
      cursor: grab;
    }

    img {
      width: 200%;
      width: 100%;
      transform-origin: 0 0;
      user-select: none;
      pointer-events: none;
    }

    /* Zoom buttons */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }

    button {
      display: block;
      margin: 5px;
      padding: 10px;
      font-size: 18px;
      border: none;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="container">
  <img id="map" src="Drusilla's_Map.png">


  <!-- Zoom Controls -->
  <div class="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
  </div>
</div>

<script>
function update() {
  const containerRect = container.getBoundingClientRect();
  const imgWidth = map.offsetWidth * scale;
  const imgHeight = map.offsetHeight * scale;

  const maxX = 0;
  const maxY = 0;
  const minX = containerRect.width - imgWidth;
  const minY = containerRect.height - imgHeight;

  // Clamp values
  x = Math.min(maxX, Math.max(minX, x));
  y = Math.min(maxY, Math.max(minY, y));

  map.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}
</script>
</body>
</html>
